name: TG Parser

on:
  workflow_dispatch:  # ручной запуск

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # убиваем если завис, не даём перекрыть следующий запуск

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install telethon gspread google-auth

      - name: Run parser
        env:
          # Аккаунт 1 (свой API_ID/HASH на my.telegram.org)
          TG_API_ID_1:   ${{ secrets.TG_API_ID_1 }}
          TG_API_HASH_1: ${{ secrets.TG_API_HASH_1 }}
          TG_SESSION_1:  ${{ secrets.TG_SESSION_1 }}
          # Аккаунт 2
          TG_API_ID_2:   ${{ secrets.TG_API_ID_2 }}
          TG_API_HASH_2: ${{ secrets.TG_API_HASH_2 }}
          TG_SESSION_2:  ${{ secrets.TG_SESSION_2 }}
          # Аккаунт 3
          TG_API_ID_3:   ${{ secrets.TG_API_ID_3 }}
          TG_API_HASH_3: ${{ secrets.TG_API_HASH_3 }}
          TG_SESSION_3:  ${{ secrets.TG_SESSION_3 }}
          # Google Sheets
          GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
          SPREADSHEET_IDS:           ${{ secrets.SPREADSHEET_IDS }}
          MESSAGES_LIMIT: '10'
        run: python parser.py
